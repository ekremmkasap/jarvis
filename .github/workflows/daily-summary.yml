name: Daily Git Summary

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run git summarizer
        env:
          OLLAMA_URL: ${{ vars.OLLAMA_URL }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          AUTOMATION_MODEL: ${{ vars.AUTOMATION_MODEL }}
        run: python scripts/run_agent.py --agent git_summarizer --window "1 day ago"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-git-summary
          path: outputs/summaries/
