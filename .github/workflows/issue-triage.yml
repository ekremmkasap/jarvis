name: Issue Triage Automation

on:
  issues:
    types: [opened, reopened, edited]

permissions:
  contents: read
  issues: write

jobs:
  issue-triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run issue router
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          OLLAMA_URL: ${{ vars.OLLAMA_URL }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          AUTOMATION_MODEL: ${{ vars.AUTOMATION_MODEL }}
        run: python scripts/run_agent.py --agent issue_router --event-path "$GITHUB_EVENT_PATH" --publish
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: issue-triage-report
          path: outputs/reports/
