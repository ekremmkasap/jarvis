<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>Jarvis Hologram</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="shell">
    <div id="agentName">JARVIS</div>
    <div id="agentRole">AI Operating System</div>
    <div id="hologram" class="hologram idle">
      <div class="ring outer"></div>
      <div class="ring middle"></div>
      <div class="core"></div>
      <div class="wave"></div>
    </div>
    <div id="agentState">Hazir</div>
    <div id="speechText"></div>
    <div id="previewText"></div>
    <div id="agentSkills"></div>
    <div id="abilityStatus"></div>
    <div id="activityMeter"><div id="activityFill"></div></div>
    <div id="connectionState">Baglaniyor...</div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
